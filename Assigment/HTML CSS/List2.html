<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <h1 align="center"><b>List-2</b></h1>
    <h2>Nested Ordered List</h2>
</head>
<body>
    <ol>
        <li>Fruits</li>
        <ol>
            <li>Apple</li>
            <li>Orange</li>
        </ol>
        <ol>
            <li>Vegetables</li>
            <ol>
                <li>Cabbage</li>
                <li>Capsicum</li>
                <ol>
                    <li>Green Capsicum</li>
                    <li>Red Capsicum</li>
                    <li>Yellow Capsicum</li>
                </ol>
            </ol>
        </ol>
    </ol>
</body>
</html>
