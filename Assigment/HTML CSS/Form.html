<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <form>
        <table align="center" border="2" cellspacing="10px" cellpadding="10px">
        <h1 align="center">User Information form</h1>
        <tr>
            <th>User Photo:</th>
            <td colspan="3">
                <input type="image" name="" id="" required>
            </td>
        </tr>
        <tr>
            <th>Username:</th>
            <td>
                <input type="text" name="" id="" required>
            </td>
            <th>Password:</th>
            <td>
                <input type="password" name="" id="" required>
            </td>
        </tr>
        <tr>
            <th>Phone No:</th>
            <td>
                <input type="text" name="" id="" required>
            </td>
            <th>Email:</th>
            <td>
                <input type="password" name="" id="" required>
            </td>
        </tr>
        <tr>
            <th>Address:</th>
            <td colspan="3">
                <textarea style="width:max-content" name="" id="" required></textarea>
            </td>
        </tr>
    </table>
    </form>
</body>
</html>
