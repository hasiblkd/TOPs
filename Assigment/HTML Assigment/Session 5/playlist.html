<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playlist-Song</title>
    <style>
        .playlist-Song{
            background-color: black;
            color: wheat;
            font-weight: bold;
        }
        #current-song{
            background-color: green;
            color: wheat;
            font-weight: bold;
            
        }
    </style>
</head>
<body>
    <p class="playlist-Song">Song 1</p>
    <p class="playlist-Song" id="current-song">Song 2</p>
    <p class="playlist-Song">Song 3</p>
    <p class="playlist-Song">Song 4</p>
    <p class="playlist-Song">Song 5</p>

</body>
</html>
