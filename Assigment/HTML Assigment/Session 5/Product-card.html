<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Card</title>
</head>
<body>
    <div 
        style="height: 400px;
        width: 200px;
        background: linear-gradient(white,#ffff00);
        padding: 30px;
        margin: 50px;
        border: 1px solid;
        border-radius: 10px;
        text-align: center;
        " >
        <img src="macbook.webp" height="200px" width="200px">
        <h4>Macbook Air M5</h4>
        <p style="font-size: 15px;">₹1,33,000</p>
        <p style="font-family: Arial, Helvetica, sans-serif; font-size: 17px;">Light-weight and High-Performance Laptop</p>
        <button
            style="
            background-color: blue;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        "
        >
            Buy
        </button>

    </div>
</body>
</html>
