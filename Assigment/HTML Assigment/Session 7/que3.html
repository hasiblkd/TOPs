<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }
        body{
            font-family:Arial, Helvetica, sans-serif;
            background:#f1f3f6;
        }
        .container{
            width:100%;
            padding:30px;
        }
        .sub-container{
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:25px;
        }
        .product-card{
            background:white;
            border:1px solid #ddd;
            border-radius:10px;
            padding:15px;
            text-align:center;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
            transition:0.3s;
        }
        .product-card:hover{
            transform:translateY(-5px);
            box-shadow:0 5px 15px rgba(0,0,0,0.2);
        }
        .product-card img{
            width:100%;
            height:180px;
            object-fit:contain;
            margin-bottom:15px;
        }
        .product-card p{
            font-size:18px;
            font-weight:bold;
            color:#212121;
        }
        @media (max-width:768px){
            .sub-container{
                grid-template-columns:repeat(2,1fr);
            }
        }
        @media (max-width:480px){
            .sub-container{
                grid-template-columns:1fr;
            }
        }
    </style>
</head>
<body>
    <section>
        <div class="container">
            <div class="sub-container">
                <div class="product-card">
                    <img src="macbook.webp" alt="macbook">
                    <p>Macbook Air M5</p>
                </div>
                <div class="product-card">
                    <img src="macbook.webp" alt="macbook">
                    <p>Macbook Air M5</p>
                </div>
                <div class="product-card">
                    <img src="macbook.webp" alt="macbook">
                    <p>Macbook Air M5</p>
                </div>
                <div class="product-card">
                    <img src="macbook.webp" alt="macbook">
                    <p>Macbook Air M5</p>
                </div>
                <div class="product-card">
                    <img src="macbook.webp" alt="macbook">
                    <p>Macbook Air M5</p>
                </div>
                <div class="product-card">
                    <img src="macbook.webp" alt="macbook">
                    <p>Macbook Air M5</p>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
