    <title>BookMyShow</title>
    <style>
        .container{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        .cards{
            display: grid;

            gap: 20px;
            margin: 20px;
            padding: 20px;
        }
        .card1{
            height: 280px;
            width: 300px;
            border: 1px solid black;

            position: relative;
        }

            height: fit-content;

            color: white;
            position: absolute;
        }
        img{

            width:300px;
        }

</head>
