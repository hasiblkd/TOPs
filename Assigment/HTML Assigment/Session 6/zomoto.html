<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zomoto</title>
    <style>
        .container{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        .card{
            height: 250px;
            width: 200px;
            border: 2px solid black;
            display: flex;
            flex-direction: column;
            margin: 20px;
            padding: 20px;
            border-radius: 20px;
            background-color: #e23744;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="r-name">
            <h4>Resturent:-Mehfil Restro</h4>
        </div>
        <div class="c-name">
            <p><b>Cuisine:-</b></p>
            <ol>
                <li>North Indian</li>
                <li>Chinese</li>
                <li>Arab</li>
                <li>Biryani</li>
            </ol>
        </div>
        <div class="rate">
            <p><b>Rating:-4.5⭐</b></p>
        </div>
        </div>
    </div>
</body>
</html>
