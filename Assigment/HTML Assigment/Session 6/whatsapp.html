<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whatsapp</title>
    <style>
        .container{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        .card{
            height: 250px;
            width: 200px;
            border: 2px solid black;
            padding: 10px;
            margin: 10px;
            border-radius: 20px;
            position: fixed;
        }
        .not-img img{
            position: absolute;
            right: 20px;
            bottom: 20px;
            height: 30px;
            width: 30px;
        }
    </style>
</head>
<body>
    <div class="container"></div>
    <div class="card">
        <div class="chat">
            <p>Chat1<br>Message</p><hr>
            <p>Chat2<br>Message</p><hr>
            <p>Chat3<br>Message</p>
        </div>
        <div class="not-img">
            <img src="chat.png" alt="chat">
        </div>
    </div>
</body>
</html>
