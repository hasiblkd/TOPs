<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart</title>
    <style>
        .container{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        .card{
            height: 250px;
            width: 200px;
            border: 2px solid black;
            padding: 10px;
            margin: 10px;
            border-radius: 20px;
            background-color: yellow;
        }
        img{
            height: 150px;
            width: 150px;
        }
        .p-name{
            display: block;
            color: black;
            margin-top: 10px;
        }
        .p-price{
            display: inline-block;
            color: black;
            margin-top: 10px;
        }
        .hide{
            display: none;
        }
        .card:hover .hide{
            display: inline-block;
            color: black;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="img1">
                <img src="macbook.webp" alt="product-image">
            </div>
            <span class="p-name">
                <b>Macbook Air M5</b>
            </span>
            <span class="p-price hide">
               ₹1,33,000
            </span>
        </div>
    </div>
</body>
</html>
